<section class="signup-container" fxLayout="row" fxLayoutAlign="center center">
    <mat-card class="signup-card">
      <h2 class="signup-title">Sign Up to GameStore</h2>
  
      <form fxLayout="column" fxLayoutGap="1.2rem" #f="ngForm" (ngSubmit)="onSubmit(f)">
        
        <mat-form-field appearance="fill">
          <mat-label>Full Name</mat-label>
          <input type="text" matInput ngModel name="fullName" required #nameInput="ngModel" />
          <mat-error *ngIf="nameInput.hasError('required')">Name is required</mat-error>
        </mat-form-field>
  
        <mat-form-field appearance="fill">
          <mat-label>Your Email</mat-label>
          <input type="email" matInput ngModel name="email" required #emailInput="ngModel" />
          <mat-error *ngIf="emailInput.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="!emailInput.hasError('required')">Please enter a valid email</mat-error>
        </mat-form-field>
  
        <mat-form-field appearance="fill" hintLabel="Minimum 8 characters">
          <mat-label>Password</mat-label>
          <input type="password" matInput ngModel name="password" required minlength="8" #passInput="ngModel" />
          <mat-hint align="end">{{ passInput.value?.length || 0 }} / 8</mat-hint>
        </mat-form-field>
  
        <mat-form-field appearance="fill">
          <mat-label>Date of Birth</mat-label>
          <input matInput [matDatepicker]="picker" ngModel name="birthDate" required />
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
  
        <mat-checkbox color="primary" ngModel name="acceptance" required>
          I accept the terms and conditions
        </mat-checkbox>
  
        <button type="submit" mat-raised-button color="primary" [disabled]="f.invalid" class="submit-button">
          Submit
        </button>
      </form>
    </mat-card>
  </section>
