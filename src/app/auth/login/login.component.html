<section class="login-container" fxLayout="row" fxLayoutAlign="center center">
  <mat-card class="login-card">
    <h2 class="login-title">Welcome back!</h2>

    <form #f="ngForm" (ngSubmit)="onLogin(f)" fxLayout="column" fxLayoutGap="1.2rem">
     
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input type="email" matInput name="email" ngModel required #emailInput="ngModel" />
        <mat-error *ngIf="emailInput.invalid">Valid email required</mat-error>
      </mat-form-field>

     
      <mat-form-field appearance="fill">
        <mat-label>Password</mat-label>
        <input type="password" matInput name="password" ngModel required minlength="8" #passwordInput="ngModel" />
        <mat-error *ngIf="passwordInput.invalid">Minimum 8 characters</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="f.invalid">
        Login
      </button>
    </form>
  </mat-card>
</section>
