<section fxLayout="column" fxLayoutAlign="center center" fxLayoutGap="20px">

        <mat-progress-spinner mode="determinate" [value]="progress"></mat-progress-spinner>
        <h1>{{ progress }} %</h1>
        <p>You can do it!</p>
        <button mat-raised-button color="accent" (click)="onStop()">Stop</button>
        <button mat-raised-button color="accent" (click) = "ngOnInit()">Resume</button>
    
    
</section>
